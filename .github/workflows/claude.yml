# Claude Code on the repo — mention @claude in an issue or PR comment and real Claude (Anthropic)
# runs in CI and opens/updates a PR. This is "Claude, there, on the brain repo."
#
# SAFETY (this is a PUBLIC repo):
#  - Triggers are RESTRICTED to repo owner/members/collaborators (the `author_association` guard),
#    so a random visitor cannot `@claude` and spend the metered Anthropic key.
#  - The key lives only in the encrypted `ANTHROPIC_API_KEY` repo secret — never in code.
#  - Cost is METERED (real Anthropic spend), unlike the free MiniMax self-builder. Use deliberately.
#
# NOTE: also install the official Claude GitHub App (github.com/apps/claude) for richer triggers; if
# the `claude-code-action` input names differ in the latest version, adjust the `with:` block.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: >
      (contains(github.event.comment.body, '@claude') ||
       contains(github.event.issue.body, '@claude')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          # Subscription (Max plan) OAuth token — no metered API spend. If the action version uses a
          # different input name, switch to `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
